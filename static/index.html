<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SonDrop</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="session-bar" id="session-bar" hidden>
        <span class="session-user" id="session-user"></span>
        <button class="toolbar-button" id="logout-button" type="button">Log out</button>
      </div>

      <section class="panel">
        <div class="screen screen-active" id="login-screen">
          <p class="eyebrow">SonDrop</p>
          <h1 class="screen-title">Sign in</h1>
          <form class="login-form" id="login-form">
            <label class="field-label" for="username-input">Username</label>
            <input class="text-input" id="username-input" name="username" type="text" autocomplete="username" required />
            <label class="field-label" for="password-input">Password</label>
            <input class="text-input" id="password-input" name="password" type="password" autocomplete="current-password" required />
            <p class="form-error" id="login-error" hidden></p>
            <button class="primary-button" id="login-button" type="submit">Log in</button>
          </form>
        </div>

        <div class="screen" id="drop-screen">
          <div class="drop-zone" id="drop-zone">
            <p class="eyebrow">SonDrop</p>
            <h1 id="drop-title">Drop your MP3 file here</h1>
            <p class="subtext" id="drop-subtext">Drag and drop an MP3 file to begin.</p>
            <button class="secondary-button" id="browse-button" type="button">Choose a file</button>
            <input class="file-input" id="file-input" type="file" accept=".mp3,audio/mpeg" />
          </div>
        </div>

        <div class="screen" id="upload-screen">
          <p class="eyebrow">Uploading</p>
          <h1 class="screen-title">Sending your file</h1>
          <p class="subtext" id="upload-file-name">Preparing upload...</p>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-label" id="progress-label">0%</p>
          <button class="secondary-button" id="cancel-upload-button" type="button">Cancel upload</button>
        </div>

        <div class="screen" id="result-screen">
          <p class="eyebrow">eyeD3 Result</p>
          <h1 class="screen-title">Analysis complete</h1>
          <p class="subtext" id="result-file-name"></p>
          <section class="result-section">
            <h2 class="result-heading">eyeD3</h2>
            <pre class="result-output" id="eyed3-output"></pre>
          </section>
          <section class="result-section">
            <h2 class="result-heading">songrec</h2>
            <pre class="result-output" id="songrec-output"></pre>
          </section>
          <div class="action-row">
            <button class="secondary-button" id="cancel-result-button" type="button">Cancel</button>
            <button class="primary-button" id="ok-button" type="button">OK</button>
          </div>
        </div>
      </section>
    </main>

    <template id="result-error-template">
      <div class="result-error">
        <strong>Analysis issue</strong>
        <p id="result-error-text"></p>
      </div>
    </template>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
