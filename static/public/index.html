<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dropMi</title>
    <link rel="icon" type="image/svg+xml" href="/public/icon.svg" />
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body data-theme="dark">
    <div class="note-rain" aria-hidden="true"></div>
    <main class="page-shell">
      <section class="panel">
        <p class="eyebrow">dropMi</p>
        <h1 class="screen-title">Sign in</h1>
        <form class="login-form" id="login-form">
          <label class="field-label" for="username-input">Username</label>
          <input class="text-input" id="username-input" name="username" type="text" autocomplete="username" required />
          <label class="field-label" for="password-input">Password</label>
          <input class="text-input" id="password-input" name="password" type="password" autocomplete="current-password" required />
          <p class="form-error" id="login-error" hidden></p>
          <button class="primary-button" id="login-button" type="submit">Log in</button>
        </form>
      </section>
    </main>

    <script type="module">
      import { initNoteRain } from "/public/note-rain.js";
      initNoteRain(document.querySelector(".note-rain"));
    </script>
    <script type="module" src="/public/app.js"></script>
  </body>
</html>
