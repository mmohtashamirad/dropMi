<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SonDrop</title>
    <link rel="stylesheet" href="/authorized/styles.css" />
  </head>
  <body data-theme="dark">
    <main class="page-shell">
      <div class="session-bar" id="session-bar" hidden>
        <span class="session-user" id="session-user"></span>
        <button class="toolbar-button" id="theme-toggle-button" type="button">Light</button>
        <button class="toolbar-button" id="logout-button" type="button">Log out</button>
      </div>

      <section class="panel" id="tab-panel" aria-live="polite"></section>
    </main>

    <template id="result-error-template">
      <div class="result-error">
        <button class="result-error-close" type="button" aria-label="Close">X</button>
        <strong>Analysis issue</strong>
        <p id="result-error-text"></p>
      </div>
    </template>

    <script type="module" src="/authorized/app.js"></script>
  </body>
</html>
