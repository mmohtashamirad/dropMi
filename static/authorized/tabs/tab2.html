        <div class="library-view screen screen-active">
          <div class="library-header">
            <div>
              <p class="eyebrow">SonDrop</p>
              <h1 class="library-title">Music Library</h1>
            </div>
            <div class="library-count" id="library-count">Loading...</div>
          </div>

          <div class="library-state" id="library-state" hidden></div>

          <div class="library-pagination" id="library-pagination" hidden>
            <button type="button" class="secondary-button" id="library-prev" disabled>Previous</button>
            <span class="library-page-info">
              Page
              <input
                type="number"
                class="library-page-input"
                id="library-page-input"
                min="1"
                step="1"
                value="1"
                inputmode="numeric"
              />
              of <span id="library-page-total">1</span>
            </span>
            <button type="button" class="secondary-button" id="library-next" disabled>Next</button>
          </div>

          <div class="library-table-wrap" id="library-table-wrap" hidden>
            <table class="library-table">
              <thead>
                <tr>
                  <th>Track</th>
                  <th>Artist</th>
                  <th>Album</th>
                  <th>Genre</th>
                  <th>Language</th>
                  <th>Duration</th>
                  <th>File</th>
                </tr>
              </thead>
              <tbody id="library-table-body"></tbody>
            </table>
          </div>
        </div>
